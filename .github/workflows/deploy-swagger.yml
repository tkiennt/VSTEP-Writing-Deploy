name: Deploy Swagger UI

on:
  push:
    branches: [ "main", "merge/FE-BE" ] # Added current active branch for compatibility
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore tools
        run: dotnet tool restore
        working-directory: Backend

      - name: Restore dependencies
        run: dotnet restore VSTEP_Writing_System.slnx
        working-directory: Backend

      - name: Build project
        run: dotnet build VSTEP_Writing_System.slnx --configuration Release --no-restore
        working-directory: Backend

      - name: Generate swagger.json
        run: |
          mkdir -p docs # Ensure docs folder exists
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet swagger tofile \
          --output docs/swagger.json \
          src/API/bin/Release/net8.0/API.dll v1
        working-directory: Backend
        env:
          ASPNETCORE_ENVIRONMENT: Development # Ensure Swagger is enabled during generation
          # Provide dummy values to satisfy startup requirements in Program.cs
          Jwt__SecretKey: "TemporarySecretKeyForGeneratingSwagger12345!"
          ConnectionStrings__PoolerConnection: "Host=localhost;Database=dummy;Username=postgres;Password=dummy"
          Supabase__Url: "https://example.supabase.co"
          Supabase__AnonKey: "dummy-key"
          Supabase__ServiceRoleKey: "dummy-key"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Backend/docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
